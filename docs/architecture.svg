<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4EFE6"/>
      <stop offset="1" stop-color="#EDE4D4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#64748B"/>
    </marker>
    <style>
      .title { font: 700 44px Georgia, serif; fill: #0F172A; }
      .subtitle { font: 600 18px 'IBM Plex Sans', Arial, sans-serif; fill: #475569; letter-spacing: 0.18em; text-transform: uppercase; }
      .section { font: 700 24px Georgia, serif; fill: #0F172A; }
      .label { font: 700 16px 'IBM Plex Sans', Arial, sans-serif; fill: #0F172A; }
      .body { font: 500 14px 'IBM Plex Sans', Arial, sans-serif; fill: #334155; }
      .small { font: 600 12px 'IBM Plex Sans', Arial, sans-serif; fill: #64748B; letter-spacing: 0.12em; text-transform: uppercase; }
      .panel { fill: rgba(255,252,247,0.88); stroke: rgba(15,23,42,0.10); stroke-width: 1.2; filter: url(#shadow); }
      .flow { stroke: #64748B; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect width="1600" height="980" rx="28" fill="url(#bg)"/>

  <text x="78" y="86" class="subtitle">Synaptic Architecture</text>
  <text x="78" y="138" class="title">AI generation, retrieval, persistence, and graph session flow</text>

  <rect x="62" y="186" width="1476" height="352" rx="28" class="panel"/>
  <text x="92" y="228" class="section">Runtime Stack</text>

  <rect x="92" y="278" width="250" height="180" rx="24" fill="#F9FAFB" stroke="#CBD5E1"/>
  <text x="120" y="322" class="small">Client</text>
  <text x="120" y="358" class="label">Next.js UI</text>
  <text x="120" y="385" class="body">React Flow graph canvas</text>
  <text x="120" y="410" class="body">Node modal / expansion</text>
  <text x="120" y="435" class="body">Cross-check + export actions</text>

  <rect x="402" y="278" width="280" height="180" rx="24" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="430" y="322" class="small">Application</text>
  <text x="430" y="358" class="label">Next.js Route Handlers</text>
  <text x="430" y="385" class="body">Session orchestration</text>
  <text x="430" y="410" class="body">Idea expansion</text>
  <text x="430" y="435" class="body">Cross-check / one-pager endpoints</text>

  <rect x="742" y="246" width="320" height="106" rx="24" fill="#ECFEFF" stroke="#5EEAD4"/>
  <text x="770" y="288" class="small">Generation</text>
  <text x="770" y="322" class="label">OpenAI Responses API</text>
  <text x="770" y="344" class="body">Structured idea generation</text>

  <rect x="742" y="372" width="320" height="106" rx="24" fill="#EEF2FF" stroke="#A5B4FC"/>
  <text x="770" y="414" class="small">Vectorization</text>
  <text x="770" y="448" class="label">OpenAI Embeddings API</text>
  <text x="770" y="470" class="body">Idea/session embeddings</text>

  <rect x="1122" y="246" width="356" height="106" rx="24" fill="#FEF3C7" stroke="#FCD34D"/>
  <text x="1150" y="288" class="small">Retrieval</text>
  <text x="1150" y="322" class="label">Elasticsearch</text>
  <text x="1150" y="344" class="body">Index ideas + sessions</text>

  <rect x="1122" y="372" width="356" height="106" rx="24" fill="#ECFDF5" stroke="#6EE7B7"/>
  <text x="1150" y="414" class="small">Persistence</text>
  <text x="1150" y="448" class="label">Supabase</text>
  <text x="1150" y="470" class="body">Sessions, ideas, edges</text>

  <path d="M342 368H390" class="flow"/>
  <path d="M682 330H730" class="flow"/>
  <path d="M682 392H730" class="flow"/>
  <path d="M1062 300H1110" class="flow"/>
  <path d="M1062 430H1110" class="flow"/>
  <path d="M1236 372V360C1236 330 1208 316 1180 316H1074" class="flow dashed"/>

  <rect x="62" y="576" width="1476" height="342" rx="28" class="panel"/>
  <text x="92" y="618" class="section">Process Flow</text>

  <rect x="92" y="684" width="200" height="128" rx="22" fill="#F9FAFB" stroke="#CBD5E1"/>
  <text x="116" y="724" class="small">Step 1</text>
  <text x="116" y="756" class="label">User enters seed</text>
  <text x="116" y="782" class="body">or expands a node</text>

  <rect x="344" y="684" width="210" height="128" rx="22" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="368" y="724" class="small">Step 2</text>
  <text x="368" y="756" class="label">API builds prompt</text>
  <text x="368" y="782" class="body">context + sibling labels</text>

  <rect x="606" y="684" width="220" height="128" rx="22" fill="#ECFEFF" stroke="#5EEAD4"/>
  <text x="630" y="724" class="small">Step 3</text>
  <text x="630" y="756" class="label">OpenAI returns JSON</text>
  <text x="630" y="782" class="body">ideas, details, analysis</text>

  <rect x="878" y="684" width="220" height="128" rx="22" fill="#EEF2FF" stroke="#A5B4FC"/>
  <text x="902" y="724" class="small">Step 4</text>
  <text x="902" y="756" class="label">Embeddings created</text>
  <text x="902" y="782" class="body">for ideas + session</text>

  <rect x="1150" y="652" width="180" height="76" rx="20" fill="#FEF3C7" stroke="#FCD34D"/>
  <text x="1174" y="692" class="small">Step 5a</text>
  <text x="1174" y="714" class="label">Index in Elastic</text>

  <rect x="1150" y="736" width="180" height="76" rx="20" fill="#ECFDF5" stroke="#6EE7B7"/>
  <text x="1174" y="776" class="small">Step 5b</text>
  <text x="1174" y="798" class="label">Persist in Supabase</text>

  <rect x="1382" y="684" width="126" height="128" rx="22" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="1406" y="724" class="small">Step 6</text>
  <text x="1406" y="756" class="label">UI re-renders</text>
  <text x="1406" y="782" class="body">graph state</text>

  <path d="M292 748H332" class="flow"/>
  <path d="M554 748H594" class="flow"/>
  <path d="M826 748H866" class="flow"/>
  <path d="M1098 748H1138" class="flow"/>
  <path d="M1330 690H1370V748H1370" class="flow"/>
  <path d="M1330 774H1370" class="flow"/>

  <text x="92" y="870" class="small">Cross-check path</text>
  <text x="250" y="870" class="body">Node modal triggers similarity search -> Elasticsearch indexed ideas + external search blend -> sources persist back onto the node.</text>
</svg>
